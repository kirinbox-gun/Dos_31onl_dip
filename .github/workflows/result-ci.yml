name: Build Result

on:
  push:
    branches: [ "main" ]
    # запускать только если изменения в папке result
    paths:
      - 'result/**'

jobs:
  build:
    runs-on: worker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push result
        uses: docker/build-push-action@v5
        with:
          context: ./result
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/dos_31onl_dip_result:latest

      - name: Deploy via Ansible
        run: |
          # 1. Создаем папку .ssh в домашней директории раннера (не в RO томе)
          mkdir -p ~/.ssh
          
          # 2. Пишем ключ из секретов в файл
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          
          # 3. Выставляем права (теперь это наш файл, прав хватит)
          chmod 600 ~/.ssh/deploy_key
          
          # 4. Запускаем плейбук
          ansible-playbook -i ansible/inventory.ini deploy_all.yml \
            --private-key ~/.ssh/deploy_key \
            --ssh-common-args="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"