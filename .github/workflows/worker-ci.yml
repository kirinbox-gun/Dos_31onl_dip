name: Build worker

on:
  push:
    branches: [ "main" ]
    # запускать только если изменения в папке worker
    paths:
      - 'worker/**'

jobs:
  build:
    runs-on: worker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push worker
        uses: docker/build-push-action@v5
        with:
          context: ./vote
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/dos_31onl_dip_worker:latest

      - name: Deploy via Ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'
        run: |
          ansible-playbook -i ansible/inventory.ini deploy_all.yml